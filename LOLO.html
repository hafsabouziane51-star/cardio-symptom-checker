    function changeLanguage(lang) {
        const data = translations[lang];
        document.documentElement.lang = lang;
        document.documentElement.dir = (lang === 'ar') ? 'rtl' : 'ltr';
        
        // Update Title
        document.getElementById('main-title').innerText = data.title;
        
        // Build Content Sections
        const container = document.getElementById('dynamic-content');
        container.innerHTML = ''; // Clear current

        data.sections.forEach(section => {
            const card = document.createElement('section');
            card.className = 'card';
            
            let html = '';
            
            if (section.title) {
                html += `<h2><i class="fa-solid ${section.icon}"></i> ${section.title}</h2>`;
            }

            if (section.subtitle) {
                html += `<h2 style="color:var(--accent-blue); font-size:1.3rem;">${section.subtitle}</h2>`;
            }

            if (section.intro) {
                html += `<p>${section.intro}</p>`;
            }

            if (section.paragraphs) {
                section.paragraphs.forEach(p => {
                    html += `<p>${p}</p>`;
                });
            }

            if (section.items) {
                html += `<ul>`;
                section.items.forEach(item => {
                    html += `<li>${item}</li>`;
                });
                html += `</ul>`;
            }

            if (section.image) {
                html += `<img src="${section.image}" alt="Medical Diagram" class="medical-img">`;
            }

            if (section.footer) {
                html += `<p style="margin-top:20px;">${section.footer}</p>`;
            }

            card.innerHTML = html;
            container.appendChild(card);
            
            // Re-observe the new element for animations
            observer.observe(card);
        });
    }

    // Intersection Observer for Animations
    const observerOptions = { threshold: 0.1 };
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
            }
        });
    }, observerOptions);

    // Theme Toggle
    function toggleTheme() {
        const body = document.body;
        const icon = document.querySelector('.theme-toggle i');
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
            icon.className = 'fa-solid fa-moon';
        } else {
            body.setAttribute('data-theme', 'dark');
            icon.className = 'fa-solid fa-sun';
        }
    }

    // Scroll Progress Bar
    window.onscroll = function() {
        const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
        const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        const scrolled = (winScroll / height) * 100;
        document.getElementById("progress-bar").style.width = scrolled + "%";
    };

    // Initialize
    changeLanguage('fr');
</script>
